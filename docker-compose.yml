version: "3.8"

services:
  # --- Model Downloader Service ---
  model-downloader:
    build:
      context: ./scripts
      dockerfile: Dockerfile.downloader
    container_name: ocr-model-downloader
    volumes:
      - ./models:/app/models
    profiles:
      - setup

  # --- Vision Model Service ---
  vision-engine:
    image: vllm/vllm-openai:latest
    container_name: ocr-vision-engine
    command: >
      --model /models/vision
      --gpu-memory-utilization 0.45
      --port 8000
      --trust-remote-code
    volumes:
      - ./models/vision:/models/vision:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "8000:8000"
    networks:
      - ocr-network
    restart: unless-stopped

  # --- Text Model Service ---
  text-engine:
    image: vllm/vllm-openai:latest
    container_name: ocr-text-engine
    command: >
      --model /models/text
      --port 8001
      --gpu-memory-utilization 0.4
      --trust-remote-code
      --quantization bitsandbytes
    volumes:
      - ./models/text:/models/text:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "8001:8001"
    networks:
      - ocr-network
    restart: unless-stopped

  # --- Application Core ---
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ocr-app
    env_file:
      - .env
    environment:
      - VISION_URL=http://vision-engine:8000/v1/chat/completions
      - TEXT_URL=http://text-engine:8001/v1/chat/completions
      - DB_PATH=/data/jobs.db
      - UPLOAD_DIR=/data/uploads
    volumes:
      - ./data:/data
    ports:
      - "8080:8501"
    networks:
      - ocr-network
    depends_on:
      - vision-engine
      - text-engine
    restart: unless-stopped

networks:
  ocr-network:
    name: ocr-network
    driver: bridge

volumes:
  data:
    name: ocr-data
