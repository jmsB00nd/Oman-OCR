services:
  # --- Model Downloader Service ---
  model-downloader:
    build:
      context: ./backend/scripts  
      dockerfile: Dockerfile.downloader
    container_name: ocr-model-downloader
    volumes:
      - ./backend/models:/app/models 
    profiles:
      - setup

  # --- Text/Vision Model Service (Chandra 2 via vLLM) ---
  text-engine:
    image: vllm/vllm-openai:latest
    container_name: ocr-text-engine
    command: >
      /models/text
      --served-model-name chandra
      --gpu-memory-utilization 0.58
      --port 8001
      --max-model-len 16384
      --trust-remote-code
      --limit-mm-per-prompt '{"image": 1}'
    volumes:
      - ./backend/models/text:/models/text:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "8001:8001"
    networks:
      - ocr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      start_period: 180s

  # --- Gemma 3 LLM Service (New) ---
  llm-engine:
    image: vllm/vllm-openai:latest
    container_name: ocr-llm-engine
    command: >
      /models/llm
      --served-model-name gemma
      --gpu-memory-utilization 0.34
      --port 8003
      --max-model-len 2048
      --trust-remote-code
    volumes:
      - ./backend/models/llm:/models/llm:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "8003:8003"
    networks:
      - ocr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      start_period: 180s

  # --- FastAPI Backend Core ---
  backend:
    build:
      context: ./backend      
      dockerfile: Dockerfile
    container_name: ocr-backend
    command: uvicorn api:app --host 0.0.0.0 --port 8002
    env_file:
      - ./backend/.env        
    environment:
      - TEXT_URL=http://text-engine:8001/v1
      - LLM_URL=http://llm-engine:8003/v1
      - VLLM_MODEL_NAME=chandra
      - GEMMA_MODEL_NAME=gemma
      - DB_PATH=/app/data/jobs.db
      - UPLOAD_DIR=/app/data/uploads
    volumes:
      - ./backend/data:/app/data 
    ports:
      - "8002:8002"
    networks:
      - ocr-network
    depends_on:
      text-engine:
        condition: service_healthy
      llm-engine:
        condition: service_healthy
    restart: unless-stopped

  # --- Streamlit Frontend UI ---
  streamlit-ui:
    build:
      context: ./backend        
      dockerfile: Dockerfile
    container_name: ocr-streamlit
    command: streamlit run ui.py --server.port=8501 --server.address=0.0.0.0
    environment:
      - API_URL=http://backend:8002 
    ports:
      - "8080:8501"
    networks:
      - ocr-network
    depends_on:
      - backend
    restart: unless-stopped

networks:
  ocr-network:
    name: ocr-network
    driver: bridge

volumes:
  ocr-data: 
    driver: local