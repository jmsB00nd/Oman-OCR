version: "3.8"

services:
  # --- Model Downloader Service ---
  model-downloader:
    build:
      context: ./scripts
      dockerfile: Dockerfile.downloader
    container_name: ocr-model-downloader
    volumes:
      - ./models:/app/models
    profiles:
      - setup

  # --- Text Model Service ---
  text-engine:
    image: vllm/vllm-openai:latest
    container_name: ocr-text-engine
    command: >
      --model /models/text
      --gpu-memory-utilization 0.85
      --port 8001
      --max-model-len 2048
      --trust-remote-code
    volumes:
      - ./models/text:/models/text:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "8001:8001" # Text Engine Port
    networks:
      - ocr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s

  # --- NEW: FastAPI Backend Core ---
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ocr-backend
    command: uvicorn api:app --host 0.0.0.0 --port 8002
    env_file:
      - .env
    environment:
      - TEXT_URL=http://text-engine:8001/v1/chat/completions
      - DB_PATH=/data/jobs.db
      - UPLOAD_DIR=/data/uploads
    volumes:
      - ./data:/data
    ports:
      - "8002:8002" # API Port mapped out for UI
    networks:
      - ocr-network
    depends_on:
      text-engine:
        condition: service_healthy
    restart: unless-stopped

  # --- NEW: Streamlit Frontend UI ---
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ocr-frontend
    command: streamlit run ui.py --server.port=8501 --server.address=0.0.0.0
    environment:
      # Connects Streamlit to the backend container
      - API_URL=http://backend:8002 
    ports:
      - "8080:8501" # Access on browser via 8080
    networks:
      - ocr-network
    depends_on:
      - backend
    restart: unless-stopped

networks:
  ocr-network:
    name: ocr-network
    driver: bridge

volumes:
  data:
    name: ocr-data