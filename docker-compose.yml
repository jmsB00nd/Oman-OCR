services:
    # --- Vision Model Service ---
    vision-engine:
    image: vllm/vllm-openai:latest
    command: --model /models/vision --gpu-memory-utilization 0.5 --port 8000 --quantization
    awq
    volumes:
    - ./models/vision:/models/vision
    deploy:
    resources:
    reservations:
    devices:
    - driver: nvidia
    count: 1
    capabilities: [gpu]
    ports:
    - "8000:8000"
    # --- Text Model Service ---
    text-engine:
    image: vllm/vllm-openai:latest
    command: --model /models/text --gpu-memory-utilization 0.3 --port 8001 --quantization
    awq
    volumes:
    - ./models/text:/models/text
    deploy:
    resources:
    reservations:
    devices:
    - driver: nvidia
    count: 1
    capabilities: [gpu]
    ports:
    - "8001:8001"
    # --- Application Core ---
    app:
    build: ./app
    environment:
    - VISION_URL=http://vision-engine:8000/v1
    - TEXT_URL=http://text-engine:8001/v1
    - DB_PATH=/data/queue.db
    volumes:
    - ./data:/data
    ports:
    - "8501:8501"
    depends_on:
    - vision-engine
    - text-engine