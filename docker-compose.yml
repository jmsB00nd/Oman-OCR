version: "3.8"

services:
  # --- Vision Model Service ---
  vision-engine:
    image: vllm/vllm-openai:latest
    container_name: ocr-vision-engine
    command: >
      --model /models/vision
      --gpu-memory-utilization 0.4
      --port 8000
      --quantization awq
    volumes:
      - ./models/vision:/models/vision:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "8000:8000"
    networks:
      - ocr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- Text Model Service ---
  text-engine:
    image: vllm/vllm-openai:latest
    container_name: ocr-text-engine
    command: >
      --model /models/text
      --gpu-memory-utilization 0.3
      --port 8001
      --quantization awq
    volumes:
      - ./models/text:/models/text:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "8001:8001"
    networks:
      - ocr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- Application Core ---
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ocr-app
    env_file:
      - .env
    environment:
      - VISION_URL=http://vision-engine:8000/v1/chat/completions
      - TEXT_URL=http://text-engine:8001/v1/chat/completions
      - DB_PATH=/data/jobs.db
      - UPLOAD_DIR=/data/uploads
    volumes:
      - ./data:/data
    ports:
      - "8080:8501"
    networks:
      - ocr-network
    depends_on:
      vision-engine:
        condition: service_healthy
      text-engine:
        condition: service_healthy
    restart: unless-stopped

networks:
  ocr-network:
    name: ocr-network
    driver: bridge

volumes:
  data:
    name: ocr-data
