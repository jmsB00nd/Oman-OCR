version: "3.8"

services:
  # --- Model Downloader Service ---
  model-downloader:
    build:
      context: ./scripts
      dockerfile: Dockerfile.downloader
    container_name: ocr-model-downloader
    volumes:
      - ./models:/app/models
    profiles:
      - setup

  # --- Text/Vision Model Service (Chandra 2 via vLLM) ---
  text-engine:
    image: vllm/vllm-openai:latest
    container_name: ocr-text-engine
    # Updated to use 'serve' positional argument and JSON for multi-modal limits
    command: >
      serve /models/text
      --served-model-name chandra
      --gpu-memory-utilization 0.90
      --port 8001
      --max-model-len 8192
      --trust-remote-code
      --limit-mm-per-prompt '{"image":1}'
    volumes:
      - ./models/text:/models/text:ro
    # vLLM/PyTorch requires shared memory to avoid bus errors
    shm_size: '2gb'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "8001:8001"
    networks:
      - ocr-network
    restart: unless-stopped
    healthcheck:
      # Adjusted to point to the correct v1/models endpoint for a more reliable check
      test: ["CMD", "curl", "-f", "http://localhost:8001/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  # --- FastAPI Backend Core ---
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ocr-backend
    command: uvicorn api:app --host 0.0.0.0 --port 8002
    env_file:
      - .env
    environment:
      - TEXT_URL=http://text-engine:8001/v1/chat/completions
      - VLLM_API_BASE=http://text-engine:8001/v1
      - VLLM_MODEL_NAME=chandra
      - DB_PATH=/data/jobs.db
      - UPLOAD_DIR=/data/uploads
    volumes:
      - ./data:/data
    ports:
      - "8002:8002"
    networks:
      - ocr-network
    depends_on:
      text-engine:
        condition: service_healthy
    restart: unless-stopped

  # --- Streamlit Frontend UI ---
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ocr-frontend
    command: streamlit run ui.py --server.port=8501 --server.address=0.0.0.0
    environment:
      - API_URL=http://backend:8002 
    ports:
      - "8080:8501"
    networks:
      - ocr-network
    depends_on:
      - backend
    restart: unless-stopped

networks:
  ocr-network:
    name: ocr-network
    driver: bridge

volumes:
  data:
    name: ocr-data